server {
    listen 5173;
    root /usr/share/nginx/html;
    index index.html;
    location / { try_files $uri /index.html; }
    location ~ ^/(analyze|graph|module|chat|recent|fs) {
        proxy_pass http://backend:8000;
        proxy_buffering off;          # SSE
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        # SSE streams (analyze progress, chat) can go idle for minutes during
        # LLM rate-limit backoff; the backend now sends periodic keep-alive
        # comments, but this is defense-in-depth against any reverse proxy
        # sitting in front of this one.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
